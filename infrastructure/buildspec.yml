version: 0.2
# CodeBuild buildspec — builds Docker image, pushes to ECR, triggers App Runner deployment

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo "Building image tag $IMAGE_TAG"

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $ECR_REPO_URI:$IMAGE_TAG .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      - echo Triggering App Runner deployment...
      - aws apprunner start-deployment --service-arn $APP_RUNNER_SERVICE_ARN --region $AWS_REGION
      - echo Deployment triggered successfully.

artifacts:
  files:
    - imagedefinitions.json
  discard-paths: yes
